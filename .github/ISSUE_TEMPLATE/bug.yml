name: Bug report
description: Report something that is broken or behaves incorrectly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please search the existing issues first to avoid duplicates.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: dropdown
    id: component
    attributes:
      label: Component / area
      options:
        - Shell (panel, dock, overview, control center)
        - An app
        - Greeter / login
        - Build / install
        - Compositor / labwc
        - Other / not sure
    validations:
      required: true
  - type: input
    id: distro
    attributes:
      label: Distribution
      placeholder: e.g. Arch, Fedora 44, Debian Sid, Vanilla OS 3 Reunion, Ubuntu 26.04
  - type: dropdown
    id: install
    attributes:
      label: How did you install it?
      options:
        - Built from source
        - OS image
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste any relevant logs or terminal output.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I have searched the existing issues
          required: true
