name: Feature request
description: Suggest a new feature or an improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what gets in the way? The "why" matters most.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Shell (panel, dock, overview, control center)
        - An app
        - Greeter / login
        - Build / install
        - Compositor / labwc
        - Other / not sure
